<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Travel Botswana</title>
    <script src="https://kit.fontawesome.com/6f879d6c21.js" crossorigin="anonymous"></script>
</head>

<body>
    <!--Navigation Menu-->
    <nav>
        <div class="nav-container container">
            <!--Logo & Name-->
            <div class="logo-container">
                <img src="./images/logo.jpg" alt="Travel Botswana logo" class="logo">
                <h2>Travel Botswana</h2>
            </div>
            <!--Menu Links-->
            <ul class="menu-container">
                <li>
                    <a href="./">Home</a>
                </li>
                <li><a href="./about_us.html">About Us</a></li>
                <li><a href="./contact_us.html" class="active">Contact Us</a></li>
            </ul>
            <!--Search input-->
            <!-- <div class="search-container" style="display: none;">
                <input type="text" name="search" id="searchResult" placeholder="Enter a destination or keyword">
                <div>
                    <button type="button">Search</button>
                    <button type="button">Clear</button>
                </div>
            </div> -->
        </div>
    </nav>
    <!--Hero Section-->
    <div class="socials">
        <a href="#"><i class="fa-brands fa-twitter" style="font-size: 1.6rem;"></i></a>
        <a href="#"><i class="fa-brands fa-facebook" style="font-size: 1.6rem;"></i></a>
        <a href="#"><i class="fa-brands fa-instagram" style="font-size: 1.6rem;"></i></a>
        <a href="#"><i class="fa-brands fa-youtube" style="font-size: 1.6rem;"></i></a>
    </div>
    <section class="contact-section container">
        <div>
            <h1>Contact Us</h1>
            <p>Get in touch with us.</p>
            <br>
        </div>
        <div class="contact-form">
            <div class="field">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your fullname">
            </div>
            <div class="field">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="field">
                <label for="message">Message:</label>
                <textarea id="message" rows="8" placeholder="Enter your message"></textarea>
            </div>
            <button class="large-btn" style="width: 100%;">Submit</button>
        </div>
    </section>
</body>

</html>
